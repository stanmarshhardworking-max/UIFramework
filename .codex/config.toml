# JetBrains Rider MCP Server (via SSE)
[mcp_servers.rider]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 300
# Use Python mcp-proxy to bridge SSE to STDIO
command = "python"
args = ["-m", "mcp_proxy", "http://localhost:64342/sse"]

# ── 交互弹窗 hooks（项目级共享，命令用相对路径以便团队成员开箱即用）──
[[hooks.PermissionRequest]]
matcher = "*"

[[hooks.PermissionRequest.hooks]]
type = "command"
command = 'python ".codex/hooks/codex_popup.py"'
timeout = 600
statusMessage = "显示 Codex 权限确认弹窗"

# -- Codex popup hooks --
[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python ".codex/hooks/codex_popup.py"'
timeout = 600
statusMessage = "显示 Codex 完成弹窗"

[[hooks.SubagentStop]]

[[hooks.SubagentStop.hooks]]
type = "command"
command = 'python ".codex/hooks/codex_popup.py"'
timeout = 600
statusMessage = "显示 Codex 子任务完成弹窗"
