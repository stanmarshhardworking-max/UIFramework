# GitHub MCP Server (remote, hosted by GitHub)
[mcp_servers.github]
enabled = true
url = "https://api.githubcopilot.com/mcp/"
# Environment variable name (not the token value itself)
bearer_token_env_var = "GITHUB_PAT_TOKEN"

# Unity MCP Server (local)
[mcp_servers.ai-game-developer]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 300
url = "http://localhost:22512"

# JetBrains Rider MCP Server (via SSE)
[mcp_servers.rider]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 300
# Use Python mcp-proxy to bridge SSE to STDIO
command = "python"
args = ["-m", "mcp_proxy", "http://localhost:64342/sse"]